<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear cuenta — cppLearn</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#070a0f;--bg2:#0c1018;--surface:#171d2c;--accent:#3b82f6;--accent2:#1d4ed8;--cyan:#06b6d4;--red:#ef4444;--green:#10b981;--text:#e2e8f0;--text2:#7c8ca0;--text3:#374151;--border:rgba(255,255,255,0.06);--r:10px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 70% 20%,rgba(59,130,246,.09) 0%,transparent 55%),radial-gradient(ellipse at 10% 90%,rgba(6,182,212,.06) 0%,transparent 50%);pointer-events:none;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.018) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;}
.auth-wrap{width:100%;max-width:440px;position:relative;z-index:1;padding:20px 0;}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:36px 32px;animation:cardIn .5s cubic-bezier(.16,1,.3,1) both;}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:26px;}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--accent2),var(--cyan));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.3px;}
.logo-text em{color:var(--cyan);font-style:normal;}
.auth-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:5px;letter-spacing:-.4px;}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.5;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:10.5px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.4px;text-transform:uppercase;}
.form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 13px;font-size:13px;color:var(--text);font-family:'Figtree',sans-serif;outline:none;transition:border-color .2s,box-shadow .2s;}
.form-input::placeholder{color:var(--text3);}
.form-input:focus{border-color:rgba(59,130,246,.45);box-shadow:0 0 0 3px rgba(59,130,246,.07);}
.form-input.pw-pad{padding-right:64px;}
.error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:var(--r);padding:10px 13px;font-size:12.5px;color:#fca5a5;margin-bottom:16px;display:flex;align-items:flex-start;gap:8px;}
.error-icon{flex-shrink:0;margin-top:1px;}
.pw-wrap{position:relative;}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text2);font-size:11px;font-family:'Figtree',sans-serif;font-weight:500;}
.pw-toggle:hover{color:var(--text);}
.pw-hint{font-size:11px;color:var(--text3);margin-top:5px;}
.pw-strength{height:3px;border-radius:2px;margin-top:6px;transition:all .3s;}
.btn{width:100%;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:var(--r);padding:11px;font-family:'Figtree',sans-serif;font-size:13px;font-weight:700;color:#fff;cursor:pointer;transition:all .2s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(59,130,246,.35);}
.auth-footer{text-align:center;font-size:12.5px;color:var(--text2);margin-top:20px;}
.auth-link{color:var(--accent);font-weight:600;text-decoration:underline;text-underline-offset:2px;}
.auth-link:hover{color:var(--text);}
.field-error{font-size:11px;color:#fca5a5;margin-top:4px;display:none;}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">C++</div>
      <div class="logo-text">cpp<em>Learn</em></div>
    </div>

    <h1 class="auth-title">Crear cuenta</h1>
    <p class="auth-sub">Registrate gratis y empieza a aprender C++ desde cero.</p>

    {% if error %}
    <div class="error-box">
      <span class="error-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </span>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.registro') }}" novalidate id="reg-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="nombre">Nombre</label>
          <input class="form-input" type="text" id="nombre" name="nombre"
                 placeholder="Ej: Vanesa" value="{{ datos.get('nombre','') }}"
                 autocomplete="given-name" required>
          <div class="field-error" id="err-nombre">Campo requerido.</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="apellido">Apellido</label>
          <input class="form-input" type="text" id="apellido" name="apellido"
                 placeholder="Ej: Caminos" value="{{ datos.get('apellido','') }}"
                 autocomplete="family-name" required>
          <div class="field-error" id="err-apellido">Campo requerido.</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Correo electronico</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="tucorreo@email.com" value="{{ datos.get('email','') }}"
               autocomplete="email" required>
        <div class="field-error" id="err-email">Ingresa un correo valido.</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contrasena</label>
        <div class="pw-wrap">
          <input class="form-input pw-pad" type="password" id="password" name="password"
                 placeholder="Minimo 6 caracteres" autocomplete="new-password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('password',this)">Mostrar</button>
        </div>
        <div class="pw-strength" id="pw-strength"></div>
        <div class="pw-hint" id="pw-hint">Escribe al menos 6 caracteres.</div>
        <div class="field-error" id="err-pw">Minimo 6 caracteres.</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm">Confirmar contrasena</label>
        <div class="pw-wrap">
          <input class="form-input pw-pad" type="password" id="confirm" name="confirm"
                 placeholder="Repite tu contrasena" autocomplete="new-password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('confirm',this)">Mostrar</button>
        </div>
        <div class="field-error" id="err-confirm">Las contrasenas no coinciden.</div>
      </div>

      <button class="btn" type="submit" id="submit-btn">Crear cuenta</button>
    </form>

    <div class="auth-footer">
      Ya tienes cuenta?
      <a href="{{ url_for('auth.login') }}" class="auth-link">Inicia sesion</a>
    </div>
  </div>
</div>

<script>
function togglePw(id, btn) {
  const i = document.getElementById(id);
  const show = i.type === 'password';
  i.type = show ? 'text' : 'password';
  btn.textContent = show ? 'Ocultar' : 'Mostrar';
}

// Indicador de fortaleza de contrasena
document.getElementById('password').addEventListener('input', function() {
  const val = this.value;
  const bar = document.getElementById('pw-strength');
  const hint = document.getElementById('pw-hint');
  if (val.length === 0) { bar.style.width='0'; bar.style.background=''; hint.textContent='Escribe al menos 6 caracteres.'; return; }
  let score = 0;
  if (val.length >= 6)  score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const colors = ['','#ef4444','#f59e0b','#f59e0b','#10b981','#10b981'];
  const labels = ['','Muy debil','Debil','Regular','Fuerte','Muy fuerte'];
  bar.style.width = (score * 20) + '%';
  bar.style.background = colors[score];
  hint.textContent = labels[score];
  hint.style.color = colors[score];
});

// Validacion frontend antes de enviar
document.getElementById('reg-form').addEventListener('submit', function(e) {
  let ok = true;
  const campos = [
    {id:'nombre',   err:'err-nombre',  check: v => v.trim().length > 0, msg:'El nombre es requerido.'},
    {id:'apellido', err:'err-apellido',check: v => v.trim().length > 0, msg:'El apellido es requerido.'},
    {id:'email',    err:'err-email',   check: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v), msg:'Correo invalido.'},
    {id:'password', err:'err-pw',      check: v => v.length >= 6, msg:'Minimo 6 caracteres.'},
  ];
  campos.forEach(c => {
    const val = document.getElementById(c.id).value;
    const err = document.getElementById(c.err);
    if (!c.check(val)) { err.style.display='block'; err.textContent=c.msg; document.getElementById(c.id).style.borderColor='rgba(239,68,68,.45)'; ok=false; }
    else { err.style.display='none'; document.getElementById(c.id).style.borderColor=''; }
  });
  const pw  = document.getElementById('password').value;
  const pw2 = document.getElementById('confirm').value;
  const errC = document.getElementById('err-confirm');
  if (pw !== pw2) { errC.style.display='block'; document.getElementById('confirm').style.borderColor='rgba(239,68,68,.45)'; ok=false; }
  else { errC.style.display='none'; }
  if (!ok) { e.preventDefault(); return; }
  const btn = document.getElementById('submit-btn');
  btn.innerHTML = '<div style="width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite"></div> Creando cuenta...';
  btn.disabled = true;
});
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
